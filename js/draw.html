<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>28x28 Draw Grid</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        canvas {
            border: 1px solid #333;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: crosshair;
        }

        .row {
            margin-top: 12px;
        }

        button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <h1>mnist_simple_mlp</h1>
    <div style="display: flex; align-items: flex-start; gap: 32px;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <canvas id="draw-simple" width="28" height="28"
                style="width: 560px; height: 560px; border: 1px solid black; image-rendering: pixelated; cursor: crosshair;"></canvas>
            <button id="clearBtn-simple">Clear</button>
        </div>

        <div style="min-width: 180px;">
            <h3 style="margin-top: 0;">Probabilities</h3>
            <div id="probabilities-simple"></div>
        </div>

        <div style="min-width: 120px;">
            <h3 style="margin-top: 0;">Prediction</h3>
            <div id="output-simple" style="font-size: 64px; font-weight: bold; font-family: sans-serif;">
                -
            </div>
        </div>
    </div>

    <h1>mnist_biased_mlp</h1>
    <div style="display: flex; align-items: flex-start; gap: 32px;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            
            <div style="display: flex; flex-direction: row; gap: 12px;">
                <canvas id="draw-biased" width="28" height="28"
                    style="width: 560px; height: 560px; border: 1px solid black; image-rendering: pixelated; cursor: crosshair;"></canvas>

                <canvas id="drag-biased" width="56" height="56"
                    style="width: 560px; height: 560px; border: 1px solid black; image-rendering: pixelated; cursor: crosshair;"></canvas>
            </div>

            <button id="clearBtn-biased">Clear</button>
        </div>

        <div style="min-width: 180px;">
            <h3 style="margin-top: 0;">Probabilities</h3>
            <div id="probabilities-biased"></div>
        </div>

        <div style="min-width: 120px;">
            <h3 style="margin-top: 0;">Prediction</h3>
            <div id="output-biased" style="font-size: 64px; font-weight: bold; font-family: sans-serif;">
                -
            </div>
        </div>
    </div>

    <script type="module" src="/src/draw.ts"></script>
    <script type="module" src="/src/drawBiased.ts"></script>
</body>

</html>
